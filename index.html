            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }
        .login-screen.hidden { opacity: 0; pointer-events: none; }
        .login-box {

        }
        .login-box .logo {

        .login-box .sub-logo {

            font-family: 'JetBrains Mono', monospace; letter-spacing: 3px; margin-bottom: 25px;
        }
        .login-box .prompt { font-family: 'JetBrains Mono', monospace; color: #008fbf; font-size: 14px; margin-bottom: 15px; }
        .login-box .prompt span { color: #00bfff; }
        .login-box input {
            width: 100%; background: #0d1219; border: 1px solid #005f8a; border-radius: 4px;
            padding: 14px 16px; color: #00bfff; font-family: 'JetBrains Mono', monospace;
            font-size: 16px; outline: none; text-align: center; transition: all 0.3s; margin-bottom: 15px;
        }
        .login-box input:focus { border-color: #00bfff; box-shadow: 0 0 15px rgba(0, 191, 255, 0.15); }
        .login-box input::placeholder { color: #003f5a; }
        .login-box .error-msg { font-size: 12px; color: #ff3366; font-family: 'JetBrains Mono', monospace; height: 20px; margin-bottom: 10px; }
        .login-box button {
            width: 100%; background: transparent; border: 1px solid #00bfff; color: #00bfff;
            padding: 14px; border-radius: 4px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
            font-weight: 700; font-size: 14px; transition: all 0.3s; letter-spacing: 2px;
        }
        .login-box button:hover { background: #00bfff; color: #0a0e14; }

        .term-bar {
            background: #0d1219; border-bottom: 1px solid #005f8a;
            padding: 8px 20px; display: flex; justify-content: space-between; align-items: center;
            font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #008fbf;

        .term-bar .left span { color: #00bfff; }
        .term-bar .right { color: #005f8a; }
        .term-bar .right .dot {

            background: #00bfff; margin-right: 6px; animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.2} }

        .container { display: flex; height: calc(100vh - 40px); }

        .sidebar {

        .sidebar-header { padding: 15px; border-bottom: 1px solid #005f8a; text-align: center; }

        .sidebar-header .title .highlight { color: #00bfff; }
        .sidebar-header .sub { font-size: 11px; color: #005f8a; margin-top: 4px; }
        .sidebar-header .count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #005f8a; margin-top: 6px; }
        .sidebar-header .count span { color: #00bfff; }

        .chat-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-list::-webkit-scrollbar { width: 5px; }
        .chat-list::-webkit-scrollbar-track { background: #0a0e14; }
        .chat-list::-webkit-scrollbar-thumb { background: #005f8a; border-radius: 3px; }

        .chat-item {
            display: flex; align-items: center; gap: 10px; padding: 10px;
            border: 1px solid transparent; border-radius: 6px; margin-bottom: 4px;
            cursor: pointer; transition: all 0.2s; background: rgba(0, 191, 255, 0.02);

        .chat-item:hover { background: rgba(0, 191, 255, 0.06); border-color: #005f8a; }
        .chat-item.active { background: rgba(0, 191, 255, 0.1); border-color: #00bfff; }
        .chat-item .avatar {
            width: 38px; height: 38px; border-radius: 50%; border: 2px solid #005f8a;
            display: flex; align-items: center; justify-content: center;
            font-family: 'JetBrains Mono', monospace; font-size: 14px;
            background: #0a0e14; flex-shrink: 0; color: #00bfff;

        .chat-item .avatar.online { border-color: #00bfff; box-shadow: 0 0 8px rgba(0, 191, 255, 0.3); }
        .chat-item .info { flex: 1; min-width: 0; }

        .chat-item .info .phone { font-size: 11px; color: #005f8a; font-family: 'JetBrains Mono', monospace; }
        .chat-item .info .preview {

        .chat-item .badge { width: 7px; height: 7px; border-radius: 50%; background: #00bfff; animation: pulse-dot 1.5s infinite; flex-shrink: 0; }

        .chat-header {
            padding: 12px 20px; border-bottom: 1px solid #005f8a;
            display: flex; align-items: center; gap: 12px; background: #0d1219;

        .chat-header .status { margin-right: auto; font-size: 11px; color: #005f8a; font-family: 'JetBrains Mono', monospace; }

        // ===== BUILD ALL CHAT DATA =====
        const allChatData = {};

        function getRandomWorkMsgs(count) {
            const msgs = [];
            let lastWasSent = Math.random() > 0.5;
            for (let i = 0; i < count; i++) {
                const isSent = !lastWasSent;
                lastWasSent = isSent;
                const text = workMsgs[Math.floor(Math.random() * workMsgs.length)];
                const h = Math.floor(Math.random() * 24);
                const m = Math.floor(Math.random() * 60);
                const time = h.toString().padStart(2,'0') + ':' + m.toString().padStart(2,'0');
                msgs.push({
                    type: isSent ? 'sent' : 'received',
                    sender: isSent ? 'أنت' : '',
                    text: text,
                    time: time
                });
            }
            return msgs;
        }

        const contacts = [];
        for (let i = 0; i < 35; i++) {
            const isPhone = (i === 0);

            const name = allNames[i];

            } else {

        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            contacts.forEach((contact, idx) => {
                const div = document.createElement('div');
                div.className = 'chat-item' + (idx === 0 ? ' active' : '');
                div.dataset.chat = contact.id;
                div.innerHTML = `
                    <div class="avatar ${contact.online ? 'online' : ''}">${contact.name[0]}</div>
                    <div class="info">
                        <div class="name">${contact.name}</div>
                        <div class="phone">${contact.phone}</div>
                        <div class="preview">${contact.preview}</div>
                    </div>
                    ${contact.online ? '<div class="badge"></div>' : ''}
                `;
                div.addEventListener('click', () => loadChat(contact.id));
                list.appendChild(div);
            });
        }

        let currentChatId = contacts[0]?.id;

        function loadChat(chatId) {
            currentChatId = chatId;
            const contact = contacts.find(c => c.id === chatId);
            if (!contact) return;

            document.getElementById('chatTarget').textContent = contact.name;
            document.getElementById('chatPhone').textContent = contact.phone;

            const msgs = allChatData[chatId] || [];
            const area = document.getElementById('messagesArea');
            area.innerHTML = '';

            msgs.forEach(msg => {
                if (msg.type === 'voice') {
                    const div = document.createElement('div');
                    div.className = 'message voice';
                    const senderDisplay = msg.sender === 'أنت' ? 'أنت' : msg.sender;
                    div.innerHTML = `<div class="sender">${senderDisplay}</div><span style="color:#00bfff;">▶</span> ${msg.text}<div class="time">${msg.time}</div>`;

                        alert('لا يمكنك تشغيل الرسالة الصوتية');
                    });
                    area.appendChild(div);
                } else if (msg.type === 'system') {
                    const div = document.createElement('div');
                    div.className = 'message system';
                    div.textContent = '⛔ ' + msg.text;
                    area.appendChild(div);
                } else {
                    const div = document.createElement('div');
                    div.className = 'message ' + msg.type;
                    const senderDisplay = msg.sender || (msg.type === 'sent' ? 'أنت' : contact.name);
                    div.innerHTML = `<div class="sender">${senderDisplay}</div>${msg.text}<div class="time">${msg.time}</div>`;
                    area.appendChild(div);
                }
            });

            area.scrollTop = area.scrollHeight;
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.chat-item[data-chat="${chatId}"]`)?.classList.add('active');
        }

        renderChatList();
        if (contacts.length > 0) loadChat(contacts[0].id);
